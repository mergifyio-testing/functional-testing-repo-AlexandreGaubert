name: scenario-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install pytest pytest-mergify

      # The local Mergify engine cannot be reached from GitHub-hosted
      # runners, so the per-test upload is replayed locally. Dump the exact
      # runtime context so the replay uses the real values, not hand-crafted
      # ones.
      - name: Dump runtime context for local replay
        run: |
          echo "::group::ENV-DUMP"
          env | sort
          echo "::endgroup::"
          echo "::group::EVENT-DUMP"
          cat "$GITHUB_EVENT_PATH"
          echo "::endgroup::"

      - name: Run tests
        run: python -m pytest tests/ -v
